<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSphere | Registro de Usuario</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="CSS/Estilos1.css">
    <style>
        :root {
            --rojo-cine: #e50914;
            --negro-fondo: #141414;
            --gris-card: #1f1f1f;
            --blanco: #ffffff;
            --texto-gris: #b3b3b3;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--negro-fondo);
            color: var(--blanco);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .register-container {
            background-color: #000000;
            padding: 40px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--rojo-cine);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        h2 {
            color: var(--rojo-cine);
            text-align: center;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 38px;
            color: var(--texto-gris);
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--texto-gris);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            background: #333;
            border: 1px solid #444;
            border-radius: 5px;
            color: white;
            outline: none;
            box-sizing: border-box;
            transition: border 0.3s;
        }

        input:focus {
            border-color: var(--rojo-cine);
        }

        .captcha-box {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        #captchaQuestion {
            font-weight: bold;
            color: var(--rojo-cine);
            letter-spacing: 2px;
            font-size: 1.1rem;
        }

        .btn-register {
            width: 100%;
            padding: 12px;
            background: var(--rojo-cine);
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-register:hover {
            background: #b80710;
        }

        .msg {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <h2>Crear Cuenta</h2>
        <form id="registerForm">
            <div class="form-group">
                <label>Nombre(s)</label>
                <i class="fas fa-user"></i>
                <input type="text" id="nombre" required placeholder="Tu nombre">
            </div>

            <div class="form-group">
                <label>Apellido</label>
                <i class="fas fa-user-tag"></i>
                <input type="text" id="apellido" required placeholder="Tu apellido">
            </div>

            <div class="form-group">
                <label>Correo Electrónico</label>
                <i class="fas fa-envelope"></i>
                <input type="email" id="correo" required placeholder="ejemplo@correo.com">
            </div>

            <div class="form-group">
                <label>Número Telefónico</label>
                <i class="fas fa-phone"></i>
                <input type="tel" id="telefono" required placeholder="Número a 10 dígitos">
            </div>

            <label>Validación Humana (Captcha)</label>
            <div class="captcha-box">
                <span id="captchaQuestion"></span>
                <input type="number" id="captchaAnswer" required placeholder="Resultado" style="padding-left: 15px;">
            </div>

            <button type="submit" class="btn-register">Registrarse</button>
            <div id="responseMsg" class="msg"></div>
        </form>
    </div>

    <script>
        // Lógica del Captcha Matemático Aleatorio
        let num1 = Math.floor(Math.random() * 10) + 1;
        let num2 = Math.floor(Math.random() * 10) + 1;
        let captchaResult = num1 + num2;
        document.getElementById('captchaQuestion').innerText = `${num1} + ${num2} =`;

        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const msgDiv = document.getElementById('responseMsg');
            const userCaptcha = parseInt(document.getElementById('captchaAnswer').value);

            // Validar Captcha en el Cliente
            if (userCaptcha !== captchaResult) {
                msgDiv.style.display = 'block';
                msgDiv.style.color = '#e50914';
                msgDiv.innerText = "❌ Captcha incorrecto. Inténtalo de nuevo.";
                return;
            }

            const payload = {
                nombre: document.getElementById('nombre').value.trim(),
                apellido: document.getElementById('apellido').value.trim(),
                correo: document.getElementById('correo').value.trim(),
                telefono: document.getElementById('telefono').value.trim()
            };

            // CORREGIDO: Enrutador apuntando a tu ID real de Render (3iqr)
            const API_BASE_URL = window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost"
                ? 'http://127.0.0.1:9090/api'
                : 'https://cinesphere-3iqr.onrender.com/api';

            try {
                const response = await fetch(`${API_BASE_URL}/registro`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                msgDiv.style.display = 'block';

                if (response.ok) {
                    msgDiv.style.color = '#2ecc71';
                    msgDiv.innerText = "✅ " + data.mensaje;
                    document.getElementById('registerForm').reset();
                    
                    setTimeout(() => { window.location.href = 'index.html'; }, 2000);
                } else {
                    msgDiv.style.color = '#e50914';
                    msgDiv.innerText = "❌ " + (data.detail || "Error al procesar el registro.");
                }
            } catch (error) {
                msgDiv.style.display = 'block';
                msgDiv.style.color = '#e50914';
                msgDiv.innerText = "❌ Error al conectar con el servidor.";
            }
        };
    </script>
</body>
</html>
