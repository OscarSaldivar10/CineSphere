<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSphere | Enciclopedia de Cine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="CSS/Estilos1.css">
    
    <style>
        :root {
            --rojo-cine: #e50914;
            --negro-fondo: #141414;
            --gris-card: #1f1f1f;
            --blanco: #ffffff;
            --texto-gris: #b3b3b3;
            --transicion: all 0.3s ease;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--negro-fondo);
            color: var(--blanco);
            overflow-x: hidden;
        }

        /* Estilo para el Spinner (Loader) */
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--rojo-cine);
            animation: spin 1s ease infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- MODALES --- */
        .auth-overlay, .about-overlay, .modal, .register-overlay {
            display: none; 
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .about-card, .modal-content, .auth-card {
            background-color: #000;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            border: 1px solid var(--rojo-cine);
            position: relative;
        }

        .auth-card { max-width: 380px; text-align: center; }

        .close-modal {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--texto-gris);
            z-index: 10;
        }
        .close-modal:hover { color: var(--rojo-cine); }

        /* --- NAVEGACIÓN --- */
        header {
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
            padding: 20px 5%;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .logo { color: var(--rojo-cine); font-size: 2rem; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; margin: 0; cursor: pointer; }

        .nav-buttons { display: flex; gap: 15px; }

        .btn-about {
            background: transparent;
            color: var(--blanco);
            border: 1px solid #444;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--rojo-cine);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Estilo secundario para el botón de crear cuenta */
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--blanco);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transicion);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--blanco);
        }

        /* --- GRID DE PELÍCULAS --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
            padding: 20px 5%;
        }

        .movie-card {
            background-color: var(--gris-card);
            border-radius: 12px;
            overflow: hidden;
            transition: var(--transicion);
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        .movie-card:hover { transform: translateY(-10px); border-color: var(--rojo-cine); }
        .movie-card img { width: 100%; height: 320px; object-fit: cover; }

        .movie-info { padding: 15px; text-align: center; flex-grow: 1; }
        .movie-info h3 { font-size: 1rem; margin: 0 0 10px; height: 2.4em; overflow: hidden; }

        .btn-details {
            width: 100%;
            padding: 10px;
            background: transparent;
            color: var(--rojo-cine);
            border: 1px solid var(--rojo-cine);
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: var(--transicion);
        }
        .btn-details:hover { background: var(--rojo-cine); color: white; }

        footer { text-align: center; padding: 40px; border-top: 1px solid #333; margin-top: 40px; }

        /* --- MEDIA QUERIES (RESPONSIVIDAD CELULARES) --- */
        @media (max-width: 768px) {
            .navbar { flex-direction: column; gap: 20px; text-align: center; }
            .logo { font-size: 1.5rem; }
            .nav-buttons { gap: 10px; width: 100%; justify-content: center; flex-wrap: wrap; }
            .btn-about, .btn-primary, .btn-secondary { padding: 8px 15px; font-size: 0.85rem; }

            header div[style*="display: flex"] { flex-direction: column; width: 100%; }
            #searchInput { max-width: 100% !important; margin-bottom: 10px; }
            #searchBtn { width: 100%; border-radius: 10px !important; }

            .grid-container { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 15px 3%; }
            .movie-card img { height: 210px; }
            .movie-info h3 { font-size: 0.85rem; }
            .btn-details { font-size: 0.8rem; padding: 8px; }

            .about-card, .modal-content, .auth-card { width: 95%; padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="aboutOverlay" class="about-overlay">
        <div class="about-card">
            <span class="close-modal" id="closeAbout">&times;</span>
            <h2 style="color: var(--rojo-cine); margin-bottom: 20px; text-align: center;">¿Qué es CineSphere?</h2>
            <p style="line-height: 1.6; color: #fff;">
                <strong>CineSphere</strong> es una plataforma digital de vanguardia diseñada como la enciclopedia definitiva para el séptimo arte...
            </p>
        </div>
    </div>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <div id="mainContent">
        <header>
            <nav class="navbar">
                <h1 class="logo" onclick="location.reload()">CineSphere</h1>
                <div class="nav-buttons">
                    <button id="showAboutBtn" class="btn-about">Acerca de Nosotros</button>
                    <button id="showLoginBtn" class="btn-secondary" onclick="window.location.href='Formulario.html'">Iniciar Sesión</button>
                    <button id="showRegisterBtn" class="btn-primary" onclick="window.location.href='Registro.html'">Crear Cuenta</button>
                </div>
            </nav>
            <div style="display: flex; justify-content: center; gap: 10px;">
                <input type="text" id="searchInput" placeholder="Busca una película..." style="width:100%; max-width:500px; padding:12px 25px; border-radius:30px; border:1px solid #444; background:rgba(255,255,255,0.05); color:white; outline:none;">
                <button id="searchBtn" class="btn-primary" style="border-radius:30px;">Buscar</button>
            </div>
        </header>

        <div id="loader" style="display: none; text-align: center; padding: 50px;">
            <div class="spinner"></div>
            <p style="color: var(--blanco);">Conectando con el servidor...</p>
        </div>

        <div id="errorMessage" style="display: none; text-align: center; padding: 20px; color: var(--rojo-cine);">
            <i class="fas fa-exclamation-triangle" style="font-size: 2rem; margin-bottom: 10px;"></i>
            <p></p>
        </div>
        <main id="movieGrid" class="grid-container"></main>

        <footer>
            <p>Proyecto desarrollado por <strong>Oscar Saldivar Jimenez</strong></p>
            <a href="https://github.com/OscarSaldivar10/cine-.git" target="_blank" style="color: var(--rojo-cine); text-decoration: none;">
                <i class="fab fa-github"></i> Ver Código en GitHub
            </a>
        </footer>
    </div>

    <script src="JS/app.js"></script>
    
    <script>
        const aboutOverlay = document.getElementById('aboutOverlay');
        const loginOverlay = document.getElementById('loginOverlay');
        const registerOverlay = document.getElementById('registerOverlay');

        if(document.getElementById('showAboutBtn')) document.getElementById('showAboutBtn').onclick = () => aboutOverlay.style.display = 'flex';
        if(document.getElementById('closeAbout')) document.getElementById('closeAbout').onclick = () => aboutOverlay.style.display = 'none';

        // CAMBIO: Sincronizado para usar la redirección física a Formulario.html limpia
        if(document.getElementById('showLoginBtn')) {
            document.getElementById('showLoginBtn').onclick = () => { 
                if(loginOverlay) {
                    loginOverlay.style.display = 'flex';
                } else {
                    window.location.href = 'Formulario.html';
                }
            };
        }
        if(document.getElementById('closeAuth')) document.getElementById('closeAuth').onclick = () => { if(loginOverlay) loginOverlay.style.display = 'none'; };
    </script>
</body>
</html>
